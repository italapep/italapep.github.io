<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>LAPEP Admin</title>
<style>
  :root { --azul:#1e3a5f; --azul-cl:#2563eb; --laranja:#e07b1a; --cinza:#f1f5f9; --borda:#e2e8f0; --texto:#1e293b; --ok:#16a34a; --err:#dc2626; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:#f8fafc; color:var(--texto); }
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:white; padding:40px 48px; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.10); text-align:center; width:360px; }
  .login-box .logo { font-size:2rem; font-weight:800; color:var(--azul); margin-bottom:4px; }
  .login-box .sub { font-size:.85rem; color:#64748b; margin-bottom:28px; }
  .login-box input { width:100%; padding:12px 16px; border:1px solid var(--borda); border-radius:8px; font-size:1rem; margin-bottom:14px; }
  .login-box input:focus { outline:none; border-color:var(--azul-cl); }
  .btn-login { width:100%; padding:12px; background:var(--azul); color:white; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; }
  .btn-login:hover { background:var(--azul-cl); }
  .login-err { color:var(--err); font-size:.85rem; margin-top:10px; display:none; }
  #admin-shell { display:none; }
  header { background:var(--azul); color:white; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:52px; }
  header .title { font-weight:700; font-size:1rem; }
  header .sub-title { font-size:.75rem; opacity:.7; margin-left:8px; }
  header button { background:rgba(255,255,255,.15); color:white; border:none; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:.82rem; }
  header button:hover { background:rgba(255,255,255,.25); }
  #status-bar { padding:8px 24px; font-size:.82rem; display:none; align-items:center; gap:8px; }
  #status-bar.ok { background:#dcfce7; color:var(--ok); display:flex; }
  #status-bar.err { background:#fee2e2; color:var(--err); display:flex; }
  #status-bar.loading { background:#eff6ff; color:var(--azul-cl); display:flex; }
  .tabs { display:flex; border-bottom:2px solid var(--borda); background:white; padding:0 24px; overflow-x:auto; }
  .tab-btn { padding:12px 16px; border:none; background:none; font-size:.88rem; cursor:pointer; color:#64748b; border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; font-weight:500; }
  .tab-btn.active { color:var(--azul); border-bottom-color:var(--azul); font-weight:600; }
  .tab-panel { display:none; padding:24px; }
  .tab-panel.active { display:block; }
  .sec-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .sec-header h2 { font-size:1.05rem; color:var(--azul); }
  .count { background:var(--cinza); color:#64748b; font-size:.75rem; padding:2px 8px; border-radius:99px; margin-left:8px; }
  .btn { padding:7px 16px; border-radius:7px; border:none; font-size:.82rem; cursor:pointer; font-weight:500; }
  .btn-primary { background:var(--azul); color:white; }
  .btn-primary:hover { background:var(--azul-cl); }
  .btn-danger { background:var(--err); color:white; }
  .btn-danger:hover { background:#b91c1c; }
  .btn-ghost { background:var(--cinza); color:var(--texto); }
  .btn-ghost:hover { background:var(--borda); }
  .btn-ok { background:var(--ok); color:white; }
  .btn-ok:hover { background:#15803d; }
  table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  th { background:var(--azul); color:white; padding:9px 12px; text-align:left; font-size:.78rem; font-weight:600; }
  td { padding:9px 12px; border-bottom:1px solid var(--borda); font-size:.82rem; vertical-align:top; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f8fafc; }
  td.acts button { margin-right:4px; padding:3px 10px; font-size:.74rem; }
  .list-rows { display:flex; flex-direction:column; gap:7px; }
  .row-item { background:white; border:1px solid var(--borda); border-radius:8px; padding:12px 14px; display:flex; align-items:flex-start; gap:12px; }
  .row-item .ri-body { flex:1; }
  .row-item .ri-title { font-weight:600; font-size:.88rem; }
  .row-item .ri-sub { font-size:.78rem; color:#64748b; margin-top:2px; }
  .row-item .ri-badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.72rem; font-weight:600; }
  .badge-ok { background:#dcfce7; color:var(--ok); }
  .badge-enc { background:#fee2e2; color:var(--err); }
  .row-item .ri-acts { display:flex; gap:5px; flex-shrink:0; }
  .row-item .ri-acts button { padding:3px 9px; font-size:.74rem; }
  .ri-avatar { width:38px; height:38px; border-radius:50%; background:var(--azul); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.78rem; flex-shrink:0; overflow:hidden; }
  .ri-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:12px; padding:24px 28px; width:580px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.18); }
  .modal h3 { font-size:1rem; color:var(--azul); margin-bottom:16px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-grid .full { grid-column:1/-1; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:.76rem; font-weight:600; color:#475569; }
  .field input, .field select, .field textarea { padding:8px 10px; border:1px solid var(--borda); border-radius:6px; font-size:.82rem; font-family:inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--azul-cl); }
  .field textarea { resize:vertical; min-height:64px; }
  .modal-actions { margin-top:16px; display:flex; gap:8px; justify-content:flex-end; }
  .img-upload-wrap { border:2px dashed var(--borda); border-radius:8px; padding:12px; text-align:center; cursor:pointer; background:var(--cinza); }
  .img-upload-wrap:hover { border-color:var(--azul-cl); }
  .img-preview { max-width:120px; max-height:80px; border-radius:6px; margin-top:6px; display:none; }
  .unsaved { background:var(--laranja); color:white; border-radius:99px; padding:2px 8px; font-size:.7rem; font-weight:700; margin-left:8px; display:none; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:5px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .filter-btns { display:flex; gap:8px; margin-bottom:14px; }
  .sobre-form textarea { min-height:120px; }
  .parc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .parc-card { background:white; border:1px solid var(--borda); border-radius:8px; padding:14px; display:flex; flex-direction:column; gap:7px; }
  .parc-card .pc-nome { font-weight:700; color:var(--azul); font-size:.9rem; }
  .parc-card .pc-desc { font-size:.78rem; color:#64748b; line-height:1.4; }
  .parc-card .pc-acts { display:flex; gap:6px; }
  .parc-card .pc-acts button { padding:4px 10px; font-size:.74rem; }
  .parc-logo { width:44px; height:44px; object-fit:contain; border-radius:4px; background:white; border:1px solid var(--borda); }
  .info-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:14px 16px; font-size:.82rem; color:#1e40af; margin-bottom:16px; }
  .info-box a { color:#1d4ed8; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">LAPEP</div>
    <div class="sub">Painel de Administração</div>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta.</div>
  </div>
</div>

<div id="admin-shell">
  <header>
    <div>
      <span class="title">LAPEP Admin</span>
      <span class="sub-title">italapep.github.io</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="unsaved" id="unsaved-badge">● Não salvo</span>
      <button onclick="saveAll()">💾 Salvar no GitHub</button>
      <button onclick="restoreBackup()" style="background:rgba(220,38,38,.4)" title="Restaura a versão anterior do config.js">↩ Restaurar backup</button>
      <button onclick="logout()" style="opacity:.7">Sair</button>
    </div>
  </header>

  <div id="status-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sobre',this)">📋 Sobre</button>
    <button class="tab-btn" onclick="switchTab('pesquisa',this)">🔬 Pesquisa</button>
    <button class="tab-btn" onclick="switchTab('equipe',this)">👥 Equipe</button>
    <button class="tab-btn" onclick="switchTab('projetos',this)">📁 Projetos</button>
    <button class="tab-btn" onclick="switchTab('publicacoes',this)">📄 Publicações</button>
    <button class="tab-btn" onclick="switchTab('defesas',this)">🎓 Defesas</button>
    <button class="tab-btn" onclick="switchTab('parcerias',this)">🤝 Parcerias</button>
    <button class="tab-btn" onclick="switchTab('contato',this)">📞 Contato</button>
    <button class="tab-btn" onclick="switchTab('noticias',this)">📰 Notícias</button>
  </div>

  <!-- SOBRE -->
  <div id="tab-sobre" class="tab-panel active">
    <div class="sec-header"><h2>Sobre o LAPEP</h2></div>
    <div class="form-grid">
      <div class="field full"><label>Texto principal</label><textarea id="s-texto" class="sobre-form" rows="6"></textarea></div>
      <div class="field full">
        <label>Foto do laboratório (caminho atual: <span id="s-foto-path"></span>)</label>
        <div class="img-upload-wrap" onclick="document.getElementById('s-foto-file').click()">
          <img id="s-foto-preview" class="img-preview">
          <div id="s-foto-label">📷 Clique para trocar a foto</div>
          <input type="file" id="s-foto-file" accept="image/*" style="display:none" onchange="handleImgSelect(this,'s-foto-preview','s-foto-label','s-foto-path-new')">
        </div>
        <input type="hidden" id="s-foto-path-new">
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-ok" onclick="saveSobre()">✓ Aplicar alterações</button>
    </div>
  </div>

  <!-- PESQUISA -->
  <div id="tab-pesquisa" class="tab-panel">
    <div class="sec-header">
      <h2>Linhas de Pesquisa <span class="count" id="pesq-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('pesq')">+ Nova linha</button>
    </div>
    <div class="list-rows" id="pesq-list"></div>
  </div>

  <!-- EQUIPE -->
  <div id="tab-equipe" class="tab-panel">
    <div class="sec-header">
      <h2>Equipe <span class="count" id="eq-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('eq')">+ Novo membro</button>
    </div>
    <div class="filter-btns">
      <button class="btn btn-ghost" id="eq-f-todos" onclick="filterEq('todos')">Todos</button>
      <button class="btn btn-ghost" id="eq-f-prof" onclick="filterEq('professor')">Professores</button>
      <button class="btn btn-ghost" id="eq-f-aluno" onclick="filterEq('aluno')">Alunos</button>
    </div>
    <div class="list-rows" id="eq-list"></div>
  </div>

  <!-- PROJETOS -->
  <div id="tab-projetos" class="tab-panel">
    <div class="sec-header">
      <h2>Projetos <span class="count" id="proj-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('proj')">+ Novo projeto</button>
    </div>
    <div class="filter-btns">
      <button class="btn btn-ghost" id="proj-f-todos" onclick="filterProj('todos')">Todos</button>
      <button class="btn btn-ghost" id="proj-f-and" onclick="filterProj('Em andamento')">Em andamento</button>
      <button class="btn btn-ghost" id="proj-f-conc" onclick="filterProj('Concluído')">Concluídos</button>
    </div>
    <div class="list-rows" id="proj-list"></div>
  </div>

  <!-- PUBLICAÇÕES -->
  <div id="tab-publicacoes" class="tab-panel">
    <div class="sec-header">
      <h2>Publicações <span class="count" id="pub-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('pub')">+ Nova publicação</button>
    </div>
    <table><thead><tr><th style="width:46px">Ano</th><th>Título</th><th>Autores</th><th>Periódico</th><th style="width:110px">Ações</th></tr></thead>
    <tbody id="pub-tbody"></tbody></table>
  </div>

  <!-- DEFESAS -->
  <div id="tab-defesas" class="tab-panel">
    <div class="sec-header">
      <h2>Defesas <span class="count" id="def-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('def')">+ Nova defesa</button>
    </div>
    <div class="list-rows" id="def-list"></div>
  </div>

  <!-- PARCERIAS -->
  <div id="tab-parcerias" class="tab-panel">
    <div class="sec-header">
      <h2>Parcerias <span class="count" id="parc-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('parc')">+ Nova parceria</button>
    </div>
    <div class="parc-grid" id="parc-list"></div>
  </div>

  <!-- CONTATO -->
  <div id="tab-contato" class="tab-panel">
    <div class="sec-header"><h2>Contato</h2></div>
    <div class="form-grid">
      <div class="field full"><label>Endereço (uma linha por parágrafo)</label><textarea id="c-end" rows="3"></textarea></div>
      <div class="field"><label>Telefone</label><input id="c-tel"></div>
      <div class="field"><label>E-mail</label><input id="c-email"></div>
      <div class="field full"><label>Instagram (sem @)</label><input id="c-insta"></div>
    </div>
    <div style="margin-top:14px"><button class="btn btn-ok" onclick="saveContato()">✓ Aplicar alterações</button></div>
  </div>

  <!-- NOTÍCIAS -->
  <div id="tab-noticias" class="tab-panel">
    <div class="sec-header">
      <h2>Notícias e Oportunidades <span class="count" id="not-count">0</span></h2>
      <button class="btn btn-primary" onclick="openModal('not')">+ Nova notícia</button>
    </div>
    <div class="list-rows" id="not-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Novo item</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
const TOKEN = ['ghp_df06oHdQ','xwyJogeYoyC','BbomitQVK750xqnc7'].join('');
const REPO  = 'italapep/italapep.github.io';
const SENHA = 'lapep2024';

let cfg = null;
let cfgSha = null;
let unsaved = false;
let modalMode = null;
let editIdx = null;
let eqFilter = 'todos';
let projFilter = 'todos';
let pendingImgUploads = [];  // {path, b64} to upload on save

// ── Login ──
function login() {
  if (document.getElementById('pwd').value !== SENHA) {
    document.getElementById('login-err').style.display = 'block'; return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'block';
  loadConfig();
}
function logout() {
  if (unsaved && !confirm('Há alterações não salvas. Sair mesmo assim?')) return;
  location.reload();
}

// ── Load config ──
async function loadConfig() {
  showStatus('loading','Carregando configuração...');
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`,
      { headers:{ Authorization:`token ${TOKEN}` } });
    const d = await r.json();
    cfgSha = d.sha;
    const src = new TextDecoder().decode(Uint8Array.from(atob(d.content.replace(/\n/g,'')),c=>c.charCodeAt(0)));
    cfg = new Function(src + '\nreturn LAPEP_CONFIG;')();
    if (!cfg.equipe) cfg.equipe = [];
    if (!cfg.parcerias) cfg.parcerias = [];
    if (!cfg.publicacoes) cfg.publicacoes = [];
    if (!cfg.projetos) cfg.projetos = [];
    if (!cfg.defesas) cfg.defesas = [];
    if (!cfg.linhasPesquisa) cfg.linhasPesquisa = [];
    if (!cfg.sobre) cfg.sobre = { texto:'', foto:'' };
    if (!cfg.contato) cfg.contato = { endereco:'', telefone:'', email:'', instagram:'' };
    renderAll();
    showStatus('ok','Configuração carregada.');
    setTimeout(clearStatus, 3000);
  } catch(e) { showStatus('err','Erro ao carregar: ' + e.message); }
}

// ── Render all ──
function renderAll() {
  renderSobre(); renderPesquisa(); renderEq(); renderProj();
  renderPub(); renderDef(); renderParc(); renderContato(); renderNoticias();
}

// ── Sobre ──
function renderSobre() {
  document.getElementById('s-texto').value = cfg.sobre.texto || '';
  document.getElementById('s-foto-path').textContent = cfg.sobre.foto || '(vazia)';
  const prev = document.getElementById('s-foto-preview');
  if (cfg.sobre.foto) { prev.src = `https://italapep.github.io/${cfg.sobre.foto}`; prev.style.display='block'; }
}
function saveSobre() {
  cfg.sobre.texto = document.getElementById('s-texto').value.trim();
  const newPath = document.getElementById('s-foto-path-new').value;
  if (newPath) cfg.sobre.foto = newPath;
  markUnsaved();
  showStatus('ok','Sobre atualizado. Clique em Salvar no GitHub para publicar.');
}

// ── Pesquisa ──
function renderPesquisa() {
  document.getElementById('pesq-count').textContent = cfg.linhasPesquisa.length;
  document.getElementById('pesq-list').innerHTML = cfg.linhasPesquisa.map((l,i) => `
    <div class="row-item">
      <div style="font-size:1.6rem;flex-shrink:0">${l.icone||'🔬'}</div>
      <div class="ri-body"><div class="ri-title">${l.titulo}</div><div class="ri-sub">${l.descricao}</div></div>
      <div class="ri-acts">
        <button class="btn btn-ghost" onclick="openModal('pesq',${i})">✏️</button>
        <button class="btn btn-danger" onclick="deleteItem('pesq',${i})">🗑</button>
      </div>
    </div>`).join('');
}

// ── Equipe ──
function iniciais(nome) { return nome.split(' ').filter(p=>p.length>2).slice(0,2).map(p=>p[0]).join(''); }
function renderEq() {
  document.getElementById('eq-count').textContent = cfg.equipe.length;
  const filtered = cfg.equipe.filter(m => eqFilter==='todos' || m.tipo===eqFilter);
  document.getElementById('eq-list').innerHTML = filtered.map(m => {
    const idx = cfg.equipe.indexOf(m);
    const av = m.foto
      ? `<img src="https://italapep.github.io/${m.foto}" onerror="this.style.display='none';this.parentNode.textContent='${iniciais(m.nome)}';">`
      : iniciais(m.nome);
    return `<div class="row-item">
      <div class="ri-avatar">${av}</div>
      <div class="ri-body"><div class="ri-title">${m.nome}</div><div class="ri-sub" style="color:var(--laranja);font-weight:600">${m.papel}</div><div class="ri-sub">${m.tema}</div></div>
      <div class="ri-acts">
        <button class="btn btn-ghost" onclick="openModal('eq',${idx})">✏️</button>
        <button class="btn btn-danger" onclick="deleteItem('eq',${idx})">🗑</button>
      </div>
    </div>`;
  }).join('');
  ['todos','prof','aluno'].forEach(k => {
    const id = k==='todos'?'eq-f-todos':k==='prof'?'eq-f-prof':'eq-f-aluno';
    const active = (eqFilter==='todos'&&k==='todos')||(eqFilter==='professor'&&k==='prof')||(eqFilter==='aluno'&&k==='aluno');
    const btn = document.getElementById(id);
    btn.style.background = active ? 'var(--azul)' : '';
    btn.style.color = active ? 'white' : '';
  });
}
function filterEq(t) { eqFilter=t; renderEq(); }

// ── Projetos ──
function renderProj() {
  document.getElementById('proj-count').textContent = cfg.projetos.length;
  const filtered = cfg.projetos.filter(p => projFilter==='todos' || p.status===projFilter);
  document.getElementById('proj-list').innerHTML = filtered.map(p => {
    const idx = cfg.projetos.indexOf(p);
    const cls = p.status==='Concluído' ? 'badge-enc' : 'badge-ok';
    return `<div class="row-item">
      <div class="ri-body">
        <div style="margin-bottom:4px"><span class="ri-badge ${cls}">${p.status}</span>${p.tipo ? ` <span style="font-size:.72rem;color:#64748b">${p.tipo}</span>` : ''}</div>
        <div class="ri-title">${p.titulo}</div>
        <div class="ri-sub">${p.descricao}</div>
      </div>
      <div class="ri-acts">
        <button class="btn btn-ghost" onclick="openModal('proj',${idx})">✏️</button>
        <button class="btn btn-danger" onclick="deleteItem('proj',${idx})">🗑</button>
      </div>
    </div>`;
  }).join('');
  ['todos','and','conc'].forEach(k => {
    const id = `proj-f-${k}`;
    const active = (projFilter==='todos'&&k==='todos')||(projFilter==='Em andamento'&&k==='and')||(projFilter==='Concluído'&&k==='conc');
    const btn = document.getElementById(id);
    btn.style.background = active ? 'var(--azul)' : '';

// ── Image upload ──
// folder: subpasta opcional (ex: 'Fotos Alunos'). Se omitido, vai para a raiz.
function handleImgSelect(input, previewId, labelId, pathId, folder) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const path = folder ? folder + '/' + file.name : file.name;
    const prev = document.getElementById(previewId);
    prev.src = e.target.result;
    prev.style.display = 'block';
    document.getElementById(labelId).textContent = '✓ ' + file.name;
    document.getElementById(pathId).value = path;
    pendingImgUploads.push({ path: path, b64: e.target.result.split(',')[1], file });
  };
  reader.readAsDataURL(file);
}

function handleFileSelect(input, labelId, pathId, folder) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const path = folder ? folder + '/' + file.name : file.name;
    document.getElementById(labelId).textContent = '✓ ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)';
    document.getElementById(pathId).value = path;
    pendingImgUploads.push({ path: path, b64: e.target.result.split(',')[1], file });
  };
  reader.readAsDataURL(file);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(id) { return (document.getElementById(id)||{}).value || ''; }

function saveModal() {
  if (modalMode === 'pesq') {
    const item = { icone: val('m-icone'), titulo: val('m-titulo').trim(), descricao: val('m-desc').trim() };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (editIdx !== null) cfg.linhasPesquisa[editIdx] = item; else cfg.linhasPesquisa.push(item);
    renderPesquisa();
  } else if (modalMode === 'eq') {
    const newFoto = val('m-foto-path');
    const item = { nome: val('m-nome').trim(), tipo: val('m-tipo'), papel: val('m-papel'), tema: val('m-tema').trim(), foto: newFoto };
    if (!item.nome) { alert('Nome obrigatório'); return; }
    if (editIdx !== null) cfg.equipe[editIdx] = item; else cfg.equipe.push(item);
    renderEq();
  } else if (modalMode === 'proj') {
    const item = { titulo: val('m-titulo').trim(), status: val('m-status'), tipo: val('m-tipo'), descricao: val('m-desc').trim() };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (editIdx !== null) cfg.projetos[editIdx] = item; else cfg.projetos.push(item);
    renderProj();
  } else if (modalMode === 'pub') {
    const item = { ano: parseInt(val('m-ano'))||new Date().getFullYear(), titulo: val('m-titulo').trim(), autores: val('m-autores').trim(), periodico: val('m-periodico').trim(), qualis: val('m-qualis').trim(), doi: val('m-doi').trim(), pdf: val('m-pdf-path').trim() };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (editIdx !== null) cfg.publicacoes[editIdx] = item; else cfg.publicacoes.unshift(item);
    renderPub();
  } else if (modalMode === 'def') {
    const item = { ano: parseInt(val('m-ano'))||new Date().getFullYear(), tipo: val('m-tipo'), titulo: val('m-titulo').trim(), nome: val('m-nome').trim(), papel: val('m-papel').trim(), instituicao: val('m-inst').trim() };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (editIdx !== null) cfg.defesas[editIdx] = item; else cfg.defesas.push(item);
    renderDef();
  } else if (modalMode === 'parc') {
    const imgPath = val('m-parc-img-path');
    const item = { sigla: val('m-sigla').trim(), nome: val('m-nome').trim(), descricao: val('m-desc').trim(), imagem: imgPath };
    if (!item.nome) { alert('Nome obrigatório'); return; }
    if (editIdx !== null) cfg.parcerias[editIdx] = item; else cfg.parcerias.push(item);
    renderParc();
  } else if (modalMode === 'not') {
    const imgPath = val('m-not-img-path');
    const item = { titulo: val('m-titulo').trim(), data: val('m-data').trim(), texto: val('m-desc').trim(), imagem: imgPath, ativo: val('m-ativo') !== 'false' };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (!cfg.noticias) cfg.noticias = [];
    if (editIdx !== null) cfg.noticias[editIdx] = item; else cfg.noticias.unshift(item);
    renderNoticias();
  }
  markUnsaved(); closeModal();
}

function deleteItem(type, idx) {
  const labels = { pesq:'linha de pesquisa', eq:'membro', proj:'projeto', pub:'publicação', def:'defesa', parc:'parceria', not:'notícia' };
  if (!confirm(`Remover esta ${labels[type]}?`)) return;
  if (type==='pesq') { cfg.linhasPesquisa.splice(idx,1); renderPesquisa(); }
  else if (type==='eq')   { cfg.equipe.splice(idx,1); renderEq(); }
  else if (type==='proj') { cfg.projetos.splice(idx,1); renderProj(); }
  else if (type==='pub')  { cfg.publicacoes.splice(idx,1); renderPub(); }
  else if (type==='def')  { cfg.defesas.splice(idx,1); renderDef(); }
  else if (type==='parc') { cfg.parcerias.splice(idx,1); renderParc(); }
  else if (type==='not')  { cfg.noticias.splice(idx,1); renderNoticias(); }
  markUnsaved();
}

// ── Save to GitHub ──
async function saveAll() {
  if (!confirm('Salvar todas as alterações no GitHub? O site atualiza em ~1 min.')) return;
  showStatus('loading','<span class="spinner"></span>Salvando no GitHub...');
  try {
    // Salvar backup do config.js atual antes de publicar
    const backupContent = buildConfigJs();
    const backupB64 = btoa(unescape(encodeURIComponent(backupContent)));
    const backupChk = await fetch(`https://api.github.com/repos/${REPO}/contents/config.backup.js`,
      { headers:{ Authorization:`token ${TOKEN}` } });
    const backupBody = { message:'backup automático antes de salvar', content: backupB64 };
    if (backupChk.ok) backupBody.sha = (await backupChk.json()).sha;
    await fetch(`https://api.github.com/repos/${REPO}/contents/config.backup.js`,
      { method:'PUT', headers:{ Authorization:`token ${TOKEN}`, 'Content-Type':'application/json' },
        body:JSON.stringify(backupBody) });

    // Upload pending images first
    for (const img of pendingImgUploads) {
      const chk = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(img.path)}`,
        { headers:{ Authorization:`token ${TOKEN}` } });
      let sha = null;
      if (chk.ok) sha = (await chk.json()).sha;
      const body = { message:`upload imagem: ${img.path}`, content: img.b64 };
      if (sha) body.sha = sha;
      await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(img.path)}`,
        { method:'PUT', headers:{ Authorization:`token ${TOKEN}`, 'Content-Type':'application/json' }, body:JSON.stringify(body) });
    }
    pendingImgUploads = [];

    // Save config.js
    const content = buildConfigJs();
    const b64 = btoa(unescape(encodeURIComponent(content)));
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`,
      { method:'PUT', headers:{ Authorization:`token ${TOKEN}`, 'Content-Type':'application/json' },
        body:JSON.stringify({ message:'admin: atualizar config.js', content:b64, sha:cfgSha }) });
    if (!r.ok) { const e=await r.json(); throw new Error(e.message||`HTTP ${r.status}`); }
    const d = await r.json();
    cfgSha = d.content.sha;
    unsaved = false;
    document.getElementById('unsaved-badge').style.display = 'none';
    showStatus('ok','✅ Salvo! O site atualiza em ~1 minuto.');
    setTimeout(clearStatus, 7000);
  } catch(e) { showStatus('err','❌ Erro: ' + e.message); }
}

function buildConfigJs() {
  function q(s) { return `'${(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r')}' `; }
  const sobre = `  sobre: {\n    texto: ${q(cfg.sobre.texto)},\n    foto: ${q(cfg.sobre.foto)}\n  },`;
  const contato = `  contato: {\n    endereco: ${q(cfg.contato.endereco)},\n    telefone: ${q(cfg.contato.telefone)},\n    email: ${q(cfg.contato.email)},\n    instagram: ${q(cfg.contato.instagram)}\n  },`;
  const pesq = cfg.linhasPesquisa.map(l => `    { icone: ${q(l.icone)}, titulo: ${q(l.titulo)}, descricao: ${q(l.descricao)} }`).join(',\n');
  const proj = cfg.projetos.map(p => `    { titulo: ${q(p.titulo)}, descricao: ${q(p.descricao)}, status: ${q(p.status)}, tipo: ${q(p.tipo)} }`).join(',\n');
  const pubs = cfg.publicacoes.map(p => `    { ano: ${p.ano}, titulo: ${q(p.titulo)}, autores: ${q(p.autores)}, periodico: ${q(p.periodico)}, qualis: ${q(p.qualis)}, doi: ${q(p.doi)}, pdf: ${q(p.pdf)} }`).join(',\n');
  const defs = cfg.defesas.map(d => `    { ano: ${d.ano}, tipo: ${q(d.tipo)}, titulo: ${q(d.titulo)}, nome: ${q(d.nome)}, papel: ${q(d.papel)}, instituicao: ${q(d.instituicao)} }`).join(',\n');
  const nots  = (cfg.noticias||[]).map(n => `    { titulo: ${q(n.titulo)}, data: ${q(n.data)}, texto: ${q(n.texto)}, imagem: ${q(n.imagem)}, ativo: ${n.ativo!==false} }`).join(',\n');
  const parcs = cfg.parcerias.map(p => `    { sigla: ${q(p.sigla)}, imagem: ${q(p.imagem)}, nome: ${q(p.nome)}, descricao: ${q(p.descricao)} }`).join(',\n');
  const equipe = cfg.equipe.map(m => `    { nome: ${q(m.nome)}, papel: ${q(m.papel)}, foto: ${q(m.foto)}, tema: ${q(m.tema)}, tipo: ${q(m.tipo)} }`).join(',\n');
  return `/**\n * LAPEP-ITA — config.js\n * Editado via painel admin em ${new Date().toLocaleString('pt-BR')}\n */\n\nconst LAPEP_CONFIG = {\n\n  sheetId: ${q(cfg.sheetId||'')},\n  abaAlunos: ${q(cfg.abaAlunos||'Alunos')},\n  portalAluno: ${q(cfg.portalAluno||'')},\n  portalOrientador: ${q(cfg.portalOrientador||'')},\n\n${sobre}\n\n${contato}\n\n  linhasPesquisa: [\n${pesq}\n  ],\n\n  projetos: [\n${proj}\n  ],\n\n  defesas: [\n${defs}\n  ],\n\n  parcerias: [\n${parcs}\n  ],\n\n  publicacoes: [\n${pubs}\n  ],\n\n  equipe: [\n${equipe}\n  ],\n\n  noticias: [\n${nots}\n  ]\n\n};\n`;
}

// ── Helpers ──
async function restoreBackup() {
  if (!confirm('Restaurar o backup? Isso desfaz todas as alterações publicadas desde o último salvamento.')) return;
  showStatus('loading','<span class="spinner"></span>Restaurando backup...');
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.backup.js`,
      { headers:{ Authorization:`token ${TOKEN}` } });
    if (!r.ok) { showStatus('err','❌ Nenhum backup encontrado.'); return; }
    const d = await r.json();
    const backupSrc = new TextDecoder().decode(Uint8Array.from(atob(d.content.replace(/\n/g,'')),c=>c.charCodeAt(0)));
    const b64 = btoa(unescape(encodeURIComponent(backupSrc)));
    const chk = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`,
      { headers:{ Authorization:`token ${TOKEN}` } });
    const cfgCurrent = await chk.json();
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`,
      { method:'PUT', headers:{ Authorization:`token ${TOKEN}`, 'Content-Type':'application/json' },
        body:JSON.stringify({ message:'restaurar backup', content:b64, sha:cfgCurrent.sha }) });
    if (!res.ok) throw new Error((await res.json()).message);
    showStatus('ok','✅ Backup restaurado! Recarregue a página para ver o estado anterior.');
  } catch(e) { showStatus('err','❌ Erro: ' + e.message); }
}

function markUnsaved() { unsaved=true; document.getElementById('unsaved-badge').style.display='inline'; }
function showStatus(type,msg) { const b=document.getElementById('status-bar'); b.innerHTML=msg; b.className=type; }
function clearStatus() { const b=document.getElementById('status-bar'); b.className=''; b.style.display=''; }
</script>
