<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>LAPEP Admin</title>
<style>
  :root {
    --azul: #1e3a5f;
    --azul-cl: #2563eb;
    --laranja: #e07b1a;
    --cinza: #f1f5f9;
    --borda: #e2e8f0;
    --texto: #1e293b;
    --ok: #16a34a;
    --err: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8fafc; color: var(--texto); }

  /* Login */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: white; padding: 40px 48px; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10); text-align: center; width: 360px;
  }
  .login-box .logo { font-size: 2rem; font-weight: 800; color: var(--azul); margin-bottom: 4px; }
  .login-box .sub { font-size: .85rem; color: #64748b; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--borda);
    border-radius: 8px; font-size: 1rem; margin-bottom: 14px;
  }
  .login-box input:focus { outline: none; border-color: var(--azul-cl); }
  .btn-login {
    width: 100%; padding: 12px; background: var(--azul); color: white;
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .btn-login:hover { background: var(--azul-cl); }
  .login-err { color: var(--err); font-size: .85rem; margin-top: 10px; display: none; }

  /* Admin shell */
  #admin-shell { display: none; }
  header {
    background: var(--azul); color: white; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between; height: 56px;
  }
  header .title { font-weight: 700; font-size: 1.1rem; }
  header .sub-title { font-size: .78rem; opacity: .7; margin-left: 10px; }
  header button {
    background: rgba(255,255,255,.15); color: white; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: .85rem;
  }
  header button:hover { background: rgba(255,255,255,.25); }

  /* Status bar */
  #status-bar {
    padding: 10px 32px; font-size: .85rem; display: none;
    align-items: center; gap: 10px;
  }
  #status-bar.ok  { background: #dcfce7; color: var(--ok); display: flex; }
  #status-bar.err { background: #fee2e2; color: var(--err); display: flex; }
  #status-bar.loading { background: #eff6ff; color: var(--azul-cl); display: flex; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid var(--borda); background: white; padding: 0 32px; }
  .tab-btn {
    padding: 14px 22px; border: none; background: none; font-size: .95rem;
    cursor: pointer; color: #64748b; border-bottom: 3px solid transparent;
    margin-bottom: -2px; font-weight: 500; transition: color .15s;
  }
  .tab-btn.active { color: var(--azul); border-bottom-color: var(--azul); font-weight: 600; }
  .tab-btn:hover:not(.active) { color: var(--texto); }

  /* Content */
  .tab-panel { display: none; padding: 28px 32px; }
  .tab-panel.active { display: block; }

  /* Section header */
  .sec-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .sec-header h2 { font-size: 1.15rem; color: var(--azul); }
  .sec-header .count { background: var(--cinza); color: #64748b; font-size: .78rem; padding: 3px 10px; border-radius: 99px; margin-left: 10px; }

  /* Buttons */
  .btn { padding: 8px 18px; border-radius: 7px; border: none; font-size: .875rem; cursor: pointer; font-weight: 500; transition: .15s; }
  .btn-primary { background: var(--azul); color: white; }
  .btn-primary:hover { background: var(--azul-cl); }
  .btn-success { background: var(--ok); color: white; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: var(--err); color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: var(--cinza); color: var(--texto); }
  .btn-ghost:hover { background: var(--borda); }
  .btn-save-all {
    position: fixed; bottom: 28px; right: 32px;
    background: var(--ok); color: white; border: none;
    padding: 14px 28px; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(22,163,74,.35);
    transition: .2s; display: none;
  }
  .btn-save-all:hover { background: #15803d; transform: translateY(-2px); }

  /* Table */
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  th { background: var(--azul); color: white; padding: 11px 14px; text-align: left; font-size: .82rem; font-weight: 600; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--borda); font-size: .875rem; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  td.actions { white-space: nowrap; }
  td.actions button { margin-right: 6px; padding: 4px 12px; font-size: .78rem; }

  /* Forms */
  .form-card {
    background: white; border: 1px solid var(--borda); border-radius: 10px;
    padding: 24px; margin-top: 24px;
  }
  .form-card h3 { font-size: 1rem; color: var(--azul); margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: .8rem; font-weight: 600; color: #475569; }
  .field input, .field select, .field textarea {
    padding: 9px 12px; border: 1px solid var(--borda); border-radius: 7px;
    font-size: .875rem; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--azul-cl);
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .form-actions { margin-top: 18px; display: flex; gap: 10px; }

  /* Partner cards */
  .parceria-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
  .parceria-card {
    background: white; border: 1px solid var(--borda); border-radius: 10px;
    padding: 18px; display: flex; flex-direction: column; gap: 8px;
  }
  .parceria-card .p-nome { font-weight: 700; color: var(--azul); }
  .parceria-card .p-desc { font-size: .82rem; color: #64748b; line-height: 1.5; }
  .parceria-card .p-actions { display: flex; gap: 8px; margin-top: 6px; }
  .parceria-card .p-actions button { padding: 5px 12px; font-size: .78rem; }

  /* Equipe list */
  .equipe-list { display: flex; flex-direction: column; gap: 8px; }
  .equipe-row {
    background: white; border: 1px solid var(--borda); border-radius: 8px;
    padding: 12px 16px; display: flex; align-items: center; gap: 14px;
  }
  .equipe-row .e-avatar {
    width: 42px; height: 42px; border-radius: 50%; background: var(--azul);
    color: white; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem; flex-shrink: 0; overflow: hidden;
  }
  .equipe-row .e-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .equipe-row .e-info { flex: 1; }
  .equipe-row .e-nome { font-weight: 600; font-size: .9rem; }
  .equipe-row .e-papel { font-size: .78rem; color: var(--laranja); font-weight: 600; margin: 1px 0; }
  .equipe-row .e-tema { font-size: .78rem; color: #64748b; }
  .equipe-row .e-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .equipe-row .e-actions button { padding: 4px 10px; font-size: .75rem; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 14px; padding: 28px 32px;
    width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
  }
  .modal h3 { font-size: 1.1rem; color: var(--azul); margin-bottom: 20px; }
  .modal .form-grid { grid-template-columns: 1fr 1fr; }
  .modal .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }

  /* Unsaved badge */
  #unsaved-badge {
    background: var(--laranja); color: white; border-radius: 99px;
    padding: 2px 8px; font-size: .72rem; font-weight: 700; margin-left: 8px; display: none;
  }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">LAPEP</div>
    <div class="sub">Painel de Administração</div>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta.</div>
  </div>
</div>

<!-- Admin -->
<div id="admin-shell">
  <header>
    <div>
      <span class="title">LAPEP Admin</span>
      <span class="sub-title">italapep.github.io</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="unsaved-badge">● Não salvo</span>
      <button onclick="saveAll()">💾 Salvar no GitHub</button>
      <button onclick="logout()" style="opacity:.7">Sair</button>
    </div>
  </header>

  <div id="status-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('publicacoes')">📄 Publicações</button>
    <button class="tab-btn" onclick="switchTab('parcerias')">🤝 Parcerias</button>
    <button class="tab-btn" onclick="switchTab('equipe')">👥 Equipe</button>
  </div>

  <!-- Publicações Tab -->
  <div id="tab-publicacoes" class="tab-panel active">
    <div class="sec-header">
      <div><h2>Publicações <span class="count" id="pub-count">0</span></h2></div>
      <button class="btn btn-primary" onclick="openModal('pub')">+ Novo artigo</button>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:50px">Ano</th>
          <th>Título</th>
          <th>Autores</th>
          <th>Periódico</th>
          <th style="width:120px">Ações</th>
        </tr>
      </thead>
      <tbody id="pub-tbody"></tbody>
    </table>
  </div>

  <!-- Parcerias Tab -->
  <div id="tab-parcerias" class="tab-panel">
    <div class="sec-header">
      <div><h2>Parcerias <span class="count" id="parc-count">0</span></h2></div>
      <button class="btn btn-primary" onclick="openModal('parc')">+ Nova parceria</button>
    </div>
    <div class="parceria-list" id="parc-list"></div>
  </div>

  <!-- Equipe Tab -->
  <div id="tab-equipe" class="tab-panel">
    <div class="sec-header">
      <div><h2>Equipe <span class="count" id="eq-count">0</span></h2></div>
      <button class="btn btn-primary" onclick="openModal('eq')">+ Novo membro</button>
    </div>
    <div style="margin-bottom:14px;display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="filterEq('todos')" id="eq-f-todos" style="background:var(--azul);color:white">Todos</button>
      <button class="btn btn-ghost" onclick="filterEq('professor')" id="eq-f-prof">Professores</button>
      <button class="btn btn-ghost" onclick="filterEq('aluno')" id="eq-f-aluno">Alunos</button>
    </div>
    <div class="equipe-list" id="eq-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">Novo item</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const TOKEN = ['ghp_df06oHdQ', 'xwyJogeYoyC', 'BbomitQVK750xqnc7'].join('');
const REPO  = 'italapep/italapep.github.io';
const SENHA = 'lapep2024';

let cfg = null;         // LAPEP_CONFIG object (working copy)
let cfgSha = null;      // current SHA of config.js on GitHub
let unsaved = false;
let modalMode = null;   // 'pub' | 'parc' | 'eq'
let editIdx = null;     // index being edited (null = new)
let eqFilter = 'todos';

// ─── Login / Logout ───────────────────────────────────────────────────────────
function login() {
  const pwd = document.getElementById('pwd').value;
  if (pwd !== SENHA) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'block';
  loadConfig();
}

function logout() {
  if (unsaved && !confirm('Tem alterações não salvas. Sair mesmo assim?')) return;
  location.reload();
}

// ─── Load config from GitHub ──────────────────────────────────────────────────
async function loadConfig() {
  showStatus('loading', 'Carregando configuração...');
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`, {
      headers: { Authorization: `token ${TOKEN}` }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    cfgSha = d.sha;
    const src = decodeURIComponent(escape(atob(d.content.replace(/\n/g, ''))));
    // eval in safe way: extract JSON-like data
    const fn = new Function(src + '\nreturn LAPEP_CONFIG;');
    cfg = fn();
    if (!cfg.equipe) cfg.equipe = [];
    if (!cfg.parcerias) cfg.parcerias = [];
    if (!cfg.publicacoes) cfg.publicacoes = [];
    renderAll();
    showStatus('ok', 'Configuração carregada com sucesso.');
    setTimeout(clearStatus, 3000);
  } catch(e) {
    showStatus('err', 'Erro ao carregar: ' + e.message);
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderPub();
  renderParc();
  renderEq();
}

function renderPub() {
  const tbody = document.getElementById('pub-tbody');
  document.getElementById('pub-count').textContent = cfg.publicacoes.length;
  tbody.innerHTML = cfg.publicacoes.map((p, i) => `
    <tr>
      <td>${p.ano}</td>
      <td style="max-width:300px;line-height:1.4">${p.titulo}</td>
      <td style="white-space:nowrap">${p.autores}</td>
      <td style="font-size:.78rem;color:#64748b;max-width:200px">${p.periodico}</td>
      <td class="actions">
        <button class="btn btn-ghost" onclick="openModal('pub',${i})">✏️</button>
        <button class="btn btn-danger" onclick="deleteItem('pub',${i})">🗑</button>
      </td>
    </tr>`).join('');
}

function renderParc() {
  const list = document.getElementById('parc-list');
  document.getElementById('parc-count').textContent = cfg.parcerias.length;
  list.innerHTML = cfg.parcerias.map((p, i) => `
    <div class="parceria-card">
      <div class="p-nome">${p.nome} <span style="color:#94a3b8;font-size:.78rem;font-weight:400">(${p.sigla})</span></div>
      <div class="p-desc">${p.descricao}</div>
      ${p.imagem ? `<div style="font-size:.75rem;color:#94a3b8">Imagem: ${p.imagem}</div>` : ''}
      <div class="p-actions">
        <button class="btn btn-ghost" onclick="openModal('parc',${i})">✏️ Editar</button>
        <button class="btn btn-danger" onclick="deleteItem('parc',${i})">🗑 Remover</button>
      </div>
    </div>`).join('');
}

function renderEq() {
  const list = document.getElementById('eq-list');
  document.getElementById('eq-count').textContent = cfg.equipe.length;
  const filtered = cfg.equipe.filter(m => eqFilter === 'todos' || m.tipo === eqFilter);
  list.innerHTML = filtered.map(m => {
    const idx = cfg.equipe.indexOf(m);
    const avContent = m.foto
      ? `<img src="https://italapep.github.io/${m.foto}" alt="${m.nome}" onerror="this.style.display='none';this.parentNode.textContent='${iniciais(m.nome)}';">`
      : iniciais(m.nome);
    return `
      <div class="equipe-row">
        <div class="e-avatar">${avContent}</div>
        <div class="e-info">
          <div class="e-nome">${m.nome}</div>
          <div class="e-papel">${m.papel}</div>
          <div class="e-tema">${m.tema}</div>
        </div>
        <div class="e-actions">
          <button class="btn btn-ghost" onclick="openModal('eq',${idx})">✏️</button>
          <button class="btn btn-danger" onclick="deleteItem('eq',${idx})">🗑</button>
        </div>
      </div>`;
  }).join('');
}

function iniciais(nome) {
  return nome.split(' ').filter(p => p.length > 2).slice(0,2).map(p => p[0]).join('');
}

function filterEq(tipo) {
  eqFilter = tipo;
  ['todos','prof','aluno'].forEach(k => {
    const id = k === 'todos' ? 'eq-f-todos' : k === 'prof' ? 'eq-f-prof' : 'eq-f-aluno';
    const isActive = (tipo === 'todos' && k === 'todos') || (tipo === 'professor' && k === 'prof') || (tipo === 'aluno' && k === 'aluno');
    const btn = document.getElementById(id);
    btn.style.background = isActive ? 'var(--azul)' : '';
    btn.style.color = isActive ? 'white' : '';
  });
  renderEq();
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(type, idx) {
  modalMode = type;
  editIdx = idx !== undefined ? idx : null;
  const isEdit = editIdx !== null;
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');

  if (type === 'pub') {
    const p = isEdit ? cfg.publicacoes[idx] : {};
    document.getElementById('modal-title').textContent = isEdit ? 'Editar Publicação' : 'Nova Publicação';
    body.innerHTML = `
      <div class="form-grid">
        <div class="field"><label>Ano</label><input id="m-ano" type="number" value="${p.ano||new Date().getFullYear()}"></div>
        <div class="field"><label>Qualis</label><input id="m-qualis" value="${p.qualis||''}"></div>
        <div class="field full"><label>Título</label><textarea id="m-titulo">${p.titulo||''}</textarea></div>
        <div class="field full"><label>Autores (ex: Silva, J. et al.)</label><input id="m-autores" value="${p.autores||''}"></div>
        <div class="field full"><label>Periódico</label><input id="m-periodico" value="${p.periodico||''}"></div>
        <div class="field full"><label>DOI / Link</label><input id="m-doi" value="${p.doi||''}"></div>
        <div class="field full"><label>Caminho do PDF (ex: Portifolio/Publicados/arquivo.pdf)</label><input id="m-pdf" value="${p.pdf||''}"></div>
      </div>`;
  } else if (type === 'parc') {
    const p = isEdit ? cfg.parcerias[idx] : {};
    document.getElementById('modal-title').textContent = isEdit ? 'Editar Parceria' : 'Nova Parceria';
    body.innerHTML = `
      <div class="form-grid">
        <div class="field"><label>Sigla</label><input id="m-sigla" value="${p.sigla||''}"></div>
        <div class="field"><label>Nome completo</label><input id="m-nome" value="${p.nome||''}"></div>
        <div class="field full"><label>Descrição</label><textarea id="m-descricao">${p.descricao||''}</textarea></div>
        <div class="field full"><label>Arquivo de imagem (ex: INPE.png — deve estar na raiz do site)</label><input id="m-imagem" value="${p.imagem||''}"></div>
      </div>`;
  } else if (type === 'eq') {
    const m = isEdit ? cfg.equipe[idx] : {};
    document.getElementById('modal-title').textContent = isEdit ? 'Editar Membro' : 'Novo Membro';
    body.innerHTML = `
      <div class="form-grid">
        <div class="field full"><label>Nome completo</label><input id="m-nome" value="${m.nome||''}"></div>
        <div class="field">
          <label>Tipo</label>
          <select id="m-tipo">
            <option value="professor" ${m.tipo==='professor'?'selected':''}>Professor</option>
            <option value="aluno" ${m.tipo==='aluno'||!m.tipo?'selected':''}>Aluno</option>
          </select>
        </div>
        <div class="field">
          <label>Nível / Cargo</label>
          <select id="m-papel" onchange="if(this.value==='__outro__')this.insertAdjacentHTML('afterend','<input id=m-papel-custom placeholder=Digite o cargo style=margin-top:6px;width:100%;padding:8px;border:1px solid var(--borda);border-radius:7px>')">
            ${['Coordenador | Professor Adjunto','Coordenador Adjunto | Professor Adjunto','Pós-Doutorado','Doutorado','Mestrado','IC','__outro__'].map(v => `<option value="${v}" ${m.papel===v?'selected':''}>${v==='__outro__'?'Outro...':v}</option>`).join('')}
          </select>
          ${!['Coordenador | Professor Adjunto','Coordenador Adjunto | Professor Adjunto','Pós-Doutorado','Doutorado','Mestrado','IC'].includes(m.papel) && m.papel ? `<input id="m-papel-custom" value="${m.papel}" style="margin-top:6px;width:100%;padding:8px;border:1px solid var(--borda);border-radius:7px">` : ''}
        </div>
        <div class="field full"><label>Tema de pesquisa</label><textarea id="m-tema">${m.tema||''}</textarea></div>
        <div class="field full"><label>Foto (ex: Fotos Alunos/Nome.jpeg — ou deixe vazio para usar iniciais)</label><input id="m-foto" value="${m.foto||''}"></div>
      </div>`;
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalMode = null;
  editIdx = null;
}

function saveModal() {
  if (modalMode === 'pub') {
    const item = {
      ano: parseInt(document.getElementById('m-ano').value) || new Date().getFullYear(),
      titulo: document.getElementById('m-titulo').value.trim(),
      autores: document.getElementById('m-autores').value.trim(),
      periodico: document.getElementById('m-periodico').value.trim(),
      qualis: document.getElementById('m-qualis').value.trim(),
      doi: document.getElementById('m-doi').value.trim(),
      pdf: document.getElementById('m-pdf').value.trim()
    };
    if (!item.titulo) { alert('Título obrigatório'); return; }
    if (editIdx !== null) cfg.publicacoes[editIdx] = item;
    else cfg.publicacoes.unshift(item);
    renderPub();
  } else if (modalMode === 'parc') {
    const item = {
      sigla: document.getElementById('m-sigla').value.trim(),
      nome: document.getElementById('m-nome').value.trim(),
      descricao: document.getElementById('m-descricao').value.trim(),
      imagem: document.getElementById('m-imagem').value.trim()
    };
    if (!item.nome) { alert('Nome obrigatório'); return; }
    if (editIdx !== null) cfg.parcerias[editIdx] = item;
    else cfg.parcerias.push(item);
    renderParc();
  } else if (modalMode === 'eq') {
    const papelSel = document.getElementById('m-papel').value;
    const papelCustom = document.getElementById('m-papel-custom');
    const papel = (papelSel === '__outro__' && papelCustom) ? papelCustom.value.trim() : papelSel;
    const item = {
      nome: document.getElementById('m-nome').value.trim(),
      tipo: document.getElementById('m-tipo').value,
      papel: papel,
      tema: document.getElementById('m-tema').value.trim(),
      foto: document.getElementById('m-foto').value.trim()
    };
    if (!item.nome) { alert('Nome obrigatório'); return; }
    if (editIdx !== null) cfg.equipe[editIdx] = item;
    else cfg.equipe.push(item);
    renderEq();
  }
  markUnsaved();
  closeModal();
}

function deleteItem(type, idx) {
  const labels = { pub: 'publicação', parc: 'parceria', eq: 'membro' };
  if (!confirm(`Remover esta ${labels[type]}?`)) return;
  if (type === 'pub') { cfg.publicacoes.splice(idx, 1); renderPub(); }
  else if (type === 'parc') { cfg.parcerias.splice(idx, 1); renderParc(); }
  else if (type === 'eq') { cfg.equipe.splice(idx, 1); renderEq(); }
  markUnsaved();
}

// ─── Unsaved state ────────────────────────────────────────────────────────────
function markUnsaved() {
  unsaved = true;
  document.getElementById('unsaved-badge').style.display = 'inline';
}

// ─── Save to GitHub ───────────────────────────────────────────────────────────
async function saveAll() {
  if (!confirm('Salvar alterações no GitHub? O site será atualizado em ~1 minuto.')) return;
  showStatus('loading', '<span class="spinner"></span>Salvando no GitHub...');

  try {
    // Rebuild config.js content
    const content = buildConfigJs();
    const b64 = btoa(unescape(encodeURIComponent(content)));

    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config.js`, {
      method: 'PUT',
      headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'admin: atualizar config.js', content: b64, sha: cfgSha })
    });

    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || `HTTP ${r.status}`);
    }

    const d = await r.json();
    cfgSha = d.content.sha;
    unsaved = false;
    document.getElementById('unsaved-badge').style.display = 'none';
    showStatus('ok', '✅ Salvo! O site atualiza em ~1 minuto.');
    setTimeout(clearStatus, 6000);
  } catch(e) {
    showStatus('err', '❌ Erro ao salvar: ' + e.message);
  }
}

function buildConfigJs() {
  function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function qs(s) { return `'${esc(s)}'`; }

  const pubs = cfg.publicacoes.map(p => `    {
      ano: ${p.ano},
      titulo: ${qs(p.titulo)},
      autores: ${qs(p.autores)},
      periodico: ${qs(p.periodico)},
      qualis: ${qs(p.qualis)},
      doi: ${qs(p.doi)},
      pdf: ${qs(p.pdf)}
    }`).join(',\n');

  const parcs = cfg.parcerias.map(p => `    {
      sigla: ${qs(p.sigla)},
      imagem: ${qs(p.imagem)},
      nome: ${qs(p.nome)},
      descricao: ${qs(p.descricao)}
    }`).join(',\n');

  const equipe = cfg.equipe.map(m => `    { nome: ${qs(m.nome)}, papel: ${qs(m.papel)}, foto: ${qs(m.foto)}, tema: ${qs(m.tema)}, tipo: ${qs(m.tipo)} }`).join(',\n');

  return `/**
 * LAPEP-ITA — Arquivo de Configuração
 * Editado via painel admin em ${new Date().toLocaleString('pt-BR')}
 * NÃO edite manualmente — use o admin.html
 */

const LAPEP_CONFIG = {

  sheetId: ${qs(cfg.sheetId||'')},
  noticiasSheetId: ${qs(cfg.noticiasSheetId||'')},
  abaAlunos: ${qs(cfg.abaAlunos||'Alunos')},
  abaNoticias: ${qs(cfg.abaNoticias||'Noticias')},

  portalAluno: ${qs(cfg.portalAluno||'')},
  portalOrientador: ${qs(cfg.portalOrientador||'')},

  parcerias: [
${parcs}
  ],

  publicacoes: [
${pubs}
  ],

  equipe: [
${equipe}
  ]

};
`;
}

// ─── Status bar ───────────────────────────────────────────────────────────────
function showStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = msg;
  bar.className = type;
}
function clearStatus() {
  const bar = document.getElementById('status-bar');
  bar.className = '';
  bar.style.display = '';
}
